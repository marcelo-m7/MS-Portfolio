server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip for compressible payloads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # SPA:try file, otherwise fallback to index.html for client routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively except index.html
    location ~* \.(?:jpg|jpeg|png|gif|ico|css|js|svg|webp|tiff|ttf|woff|woff2|otf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, no-transform";
        try_files $uri $uri/ /index.html;
    }

    # Reduce excessive logging for cleaner docker logs
    access_log off;
}
